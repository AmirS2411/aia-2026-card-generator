<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIA 2026 Card Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('bg-landing.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            color: white;
        }
        .container {
            background: rgba(10, 34, 64, 0.85);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            color: #ffffff;
            margin-top: 0;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #e0e0e0;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
        }
        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .preview-container {
            margin-top: 30px;
            text-align: center;
        }
        canvas {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            display: none;
        }
        .placeholder-canvas {
            width: 100%;
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 8px;
        }
        .btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        .logo-preview {
            display: block;
            margin: 0 auto 20px;
            height: 70px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        footer {
            margin-top: 30px;
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            letter-spacing: 0.5px;
        }
        p {
            color: #ccc !important;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://aviationinsurance.org/wp-content/uploads/2023/10/AIA-Logo-2024-Transparent.png" alt="AIA Logo" class="logo-preview" onerror="this.style.display='none'">
    <h1>Create Your AIA 2026 Card</h1>
    <p style="text-align: center; color: #666; margin-bottom: 25px;">Ready for Dallas? Generate your custom LinkedIn badge and let everyone know you'll be at AIA 2026! ✈️</p>
    
    <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="e.g. Wilbur Wright" maxlength="30">
    </div>

    <div class="form-group">
        <label for="title">Your Title</label>
        <input type="text" id="title" placeholder="e.g. Aviation Visionary" maxlength="40">
    </div>

    <div class="form-group">
        <label for="company">Company Name</label>
        <input type="text" id="company" placeholder="e.g. Wright Bros" maxlength="40">
    </div>

    <div class="form-group">
        <label for="photo">Your Photo</label>
        <input type="file" id="photo" accept="image/*">
    </div>

    <button id="generateBtn" class="btn">Generate My Badge</button>

    <div class="preview-container">
        <div id="placeholder" class="placeholder-canvas">Your generated image will appear here</div>
        <div id="resultContainer" style="display: none;">
            <img id="resultImage" style="max-width: 100%; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);">
            <p style="font-size: 0.9em; font-weight: normal; color: #10b981; margin-top: 15px; background: rgba(16, 185, 129, 0.1); padding: 8px; border-radius: 8px;">👇 Long-press the image to save it!</p>
        </div>
        <canvas id="canvas" width="1254" height="1254" style="display: none;"></canvas>
    </div>
    <footer>Developed with 💙 by Skywatch</footer>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const generateBtn = document.getElementById('generateBtn');
    const photoInput = document.getElementById('photo');
    const nameInput = document.getElementById('name');
    const titleInput = document.getElementById('title');
    const companyInput = document.getElementById('company');
    const placeholder = document.getElementById('placeholder');
    const resultContainer = document.getElementById('resultContainer');
    const resultImage = document.getElementById('resultImage');

    const templateImg = new Image();
    templateImg.src = 'template.jpg';

    const COORDS = {
        circle: { x: 920, y: 750, r: 210 },
        name: { x: 920, y: 1000 },
        details: { x: 920, y: 1050 }
    };

    generateBtn.addEventListener('click', () => {
        if (!photoInput.files[0]) {
            alert('Please upload a photo first');
            return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
            const userImg = new Image();
            userImg.onload = () => {
                render(userImg);
            };
            userImg.src = e.target.result;
        };
        reader.readAsDataURL(photoInput.files[0]);
    });

    function render(userImg) {
        ctx.drawImage(templateImg, 0, 0);

        ctx.save();
        ctx.beginPath();
        ctx.arc(COORDS.circle.x, COORDS.circle.y, COORDS.circle.r, 0, Math.PI * 2);
        ctx.closePath();
        ctx.clip();

        const diameter = COORDS.circle.r * 2;
        const scale = Math.max(diameter / userImg.width, diameter / userImg.height);
        const drawWidth = userImg.width * scale;
        const drawHeight = userImg.height * scale;

        const offsetX = (diameter - drawWidth) / 2;
        const faceBias = 0.1;
        const offsetY = (diameter - drawHeight) * (0.5 - faceBias);

        ctx.drawImage(
            userImg, 
            COORDS.circle.x - COORDS.circle.r + offsetX, 
            COORDS.circle.y - COORDS.circle.r + offsetY, 
            drawWidth, 
            drawHeight
        );
        ctx.restore();

        ctx.strokeStyle = 'white';
        ctx.lineWidth = 12;
        ctx.beginPath();
        ctx.arc(COORDS.circle.x, COORDS.circle.y, COORDS.circle.r, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = 'white';
        ctx.font = 'bold 44px Montserrat, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(nameInput.value.toUpperCase() || 'YOUR NAME', COORDS.name.x, COORDS.name.y);

        const subtext = `${titleInput.value}${titleInput.value && companyInput.value ? ' @ ' : ''}${companyInput.value}`;
        ctx.fillStyle = '#6ca9d6';
        ctx.font = 'bold 36px Montserrat, sans-serif';
        ctx.fillText(subtext.toUpperCase() || 'YOUR TITLE @ COMPANY', COORDS.details.x, COORDS.details.y);

        resultImage.src = canvas.toDataURL('image/png');
        resultContainer.style.display = 'block';
        placeholder.style.display = 'none';
    }
</script>

</body>
</html>
